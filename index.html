<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Scholars Tuition Centre</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

html{scroll-behavior:smooth;}
body{
  margin-top:80px;
  background:none;
  position:relative;
  color:#333;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("background.jpg") center/cover no-repeat;
  opacity:0.4;
  z-index:-1;
}

/* CONTAINER */
.container{max-width:1100px;margin:auto;padding:0 20px}

/* HEADER */
header{
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 20px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  box-shadow: 0 3px 15px rgba(0,0,0,0.08);
  transition: all 0.3s ease;
}

header img{height:40px;}

.nav-text{text-align:center;flex:1;}
.nav-text h1{font-size:18px;color:#d32f2f;}
.nav-text p{font-size:12px;color:#555;}

header.shrink{padding:5px 15px;}
header.shrink img{height:30px;}
header.shrink .nav-text h1{font-size:14px;}

.btn{
  background:#d32f2f;
  color:#fff;
  padding:8px 15px;
  border-radius:8px;
  text-decoration:none;
}

/* FEATURES */
.features{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:50px 20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,.1);
}

/* RESULTS */
.results{padding:80px 20px;text-align:center;}

.result-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.result-card{
  background:#fff;
  padding:20px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.img-box{position:relative;}

.img-box img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:20px;
}

.result-badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#ff5722;
  color:#fff;
  padding:5px 10px;
  border-radius:10px;
}

.percent{font-size:24px;color:#2e7d32;font-weight:bold;}

.stats{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:40px;
}

/* SLIDER */
.slider{position:relative;overflow:hidden;margin-top:30px;}
.slides{display:flex;transition:0.5s;}

.slides img{
  width:calc(100%/3);
  height:220px;
  object-fit:contain;
  background:#eee;
  border-radius:15px;
  padding:10px;
}

/* BUTTONS */
.prev,.next{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#0008;
  color:#fff;
  border:none;
  padding:10px;
  cursor:pointer;
  border-radius:50%;
}
.prev{left:10px;}
.next{right:10px;}

/* FLIPBOOK */
.book{
  width:300px;
  height:420px;
  margin:auto;
  perspective:2000px;
  position:relative;
}

.page{
  position:absolute;
  width:100%;
  height:100%;
  transform-origin:left;
  transition:1s;
}

.page img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.page.flipped{transform:rotateY(-180deg);}

/* CONTACT */
.contact-section{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  padding:60px 20px;
}

.contact-box{
  flex:1;
  min-width:300px;
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.contact-box iframe{
  width:100%;
  height:350px;
  border:none;
}

.btn-map{
  display:inline-block;
  margin-top:10px;
  background:#d32f2f;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  text-decoration:none;
}

/* PRICING */
.pricing-row{
  display:flex;
  overflow-x:auto;
  gap:20px;
}

.pricing-col{
  min-width:250px;
  background:#fff;
  padding:20px;
  border-radius:15px;
}

.pricing-col ul li{
  padding:5px 0;
}

/* WHATSAPP */
.whatsapp-btn{
  position:fixed;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:10px 15px;
  border-radius:30px;
  text-decoration:none;
}

.w1{bottom:20px;}
.w2{bottom:70px;}

/* MOBILE */
@media(max-width:768px){
  .features{grid-template-columns:1fr;}
  .slides img{width:50%;}
}

@media(max-width:480px){
  .slides img{width:100%;}
}

</style>
</head>

<body>

<header id="mainHeader">
  <img src="Logo.png">
  <div class="nav-text">
    <h1>Shree Scholars Tuition Centre</h1>
    <p>From Foundation to Future</p>
  </div>
  <a href="#" onclick="showAlert()" class="btn">Contact</a>
</header>

<!-- FEATURES -->
<section class="features container">
  <div class="card">Expert Teachers</div>
  <div class="card">All Subjects</div>
  <div class="card">Top Results</div>
</section>

<!-- RESULTS -->
<section class="results container">
  <h2>🏆 Board Toppers</h2>

  <div class="result-grid">
    <div class="result-card">
      <div class="img-box">
        <img src="t1.jpg">
        <span class="result-badge">TOPPER</span>
      </div>
      <h3>Rahul</h3>
      <p class="percent">95%</p>
    </div>
  </div>

  <div class="stats">
    <div><h3>100%</h3><p>Result</p></div>
    <div><h3>500+</h3><p>Students</p></div>
  </div>
</section>

<!-- SLIDER -->
<section class="gallery container">
  <h2>Our Toppers</h2>

  <div class="slider">
    <button class="prev">&#10094;</button>

    <div class="slides" id="slides">
      <img src="tp1.jpg">
      <img src="tp2.jpg">
      <img src="tp3.jpg">
      <img src="tp4.jpg">
    </div>

    <button class="next">&#10095;</button>
  </div>
</section>

<!-- CONTACT -->
<section class="contact-section container">

  <div class="contact-box">
    <h2>Admission Form</h2>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSedAOS3RrMFufn1OALf2aIQR3yp02vhBlTkBEYKB2IlWhuFnQ/viewform?embedded=true"></iframe>
  </div>

  <div class="contact-box">
    <h2>📍 Location</h2>
    <iframe src="https://www.google.com/maps?q=26.760083,83.366028&output=embed"></iframe>
    <a href="https://www.google.com/maps?q=26.760083,83.366028" target="_blank" class="btn-map">Get Directions</a>
  </div>

</section>

<!-- WHATSAPP -->
<a href="https://wa.me/918953012298" class="whatsapp-btn w1">Chat 1</a>
<a href="https://wa.me/919565959697" class="whatsapp-btn w2">Chat 2</a>

<script>

/* HEADER SCROLL */
window.addEventListener("scroll", function(){
  document.getElementById("mainHeader")
  .classList.toggle("shrink", window.scrollY > 50);
});

/* SLIDER */
let index=0;
const slides=document.getElementById("slides");
const total=slides.children.length;

function showSlide(){
  let w=slides.children[0].offsetWidth;
  slides.style.transform=`translateX(-${index*w}px)`;
}

document.querySelector(".next").onclick=()=>{
  if(index<total-3) index++;
  showSlide();
}

document.querySelector(".prev").onclick=()=>{
  if(index>0) index--;
  showSlide();
}

setInterval(()=>{
  index=(index+1)%(total-2);
  showSlide();
},3000);

/* ALERT */
function showAlert(){
  alert("Call: 8953012298 / 9565959697");
}

</script>

</body>
</html>
