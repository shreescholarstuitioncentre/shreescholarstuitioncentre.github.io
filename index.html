<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SSTC Software</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#0b1e3c;color:#fff}
nav{background:#000;padding:10px;display:flex;justify-content:space-between}
button{padding:8px 12px;margin:5px;border:none;border-radius:5px;cursor:pointer}
#loginPopup{display:none;position:fixed;width:100%;height:100%;background:#0008;justify-content:center;align-items:center}
.box{background:#fff;color:#000;padding:20px;border-radius:10px}
#admin,#student{display:none;background:#fff;color:#000;padding:20px}
</style>

</head>
<body>

<!-- WEBSITE -->
<div id="website">
<nav>
<h3>SSTC</h3>
<button onclick="openLogin()">Login</button>
</nav>

<center>
<h1>Shree Scholars Tuition Centre</h1>
<p>From Foundation to Future</p>
</center>
</div>

<!-- LOGIN -->
<div id="loginPopup">
<div class="box">

<h3>Login</h3>

<select id="role">
<option value="admin">Admin</option>
<option value="student">Student</option>
</select>

<br><br>

<input id="id" placeholder="Enter ID"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<button onclick="closeLogin()">Close</button>

</div>
</div>

<!-- ADMIN PANEL -->
<div id="admin">

<h2>Admin Panel</h2>
<button onclick="logout()">Logout</button>

<h3>Add Student Result</h3>
<input id="sname" placeholder="Student Name">
<input id="sid" placeholder="Student ID">
<input id="marks" placeholder="Marks">

<button onclick="saveResult()">Save</button>

<button onclick="loadResults()">View All</button>

<ul id="list"></ul>

</div>

<!-- STUDENT PANEL -->
<div id="student">

<h2>Student Dashboard</h2>
<button onclick="logout()">Logout</button>

<h3>Your Result</h3>
<button onclick="loadMyResult()">Check Result</button>

<ul id="myResult"></ul>

<canvas id="chart" width="300"></canvas>

</div>

<script>

// ================= CONFIG =================
const API_URL="https://script.google.com/macros/s/AKfycbw-BKfnl8tRue3-1dn7DwpjFMxtSo1-A5ApuOvpdBDH/dev";

// ================= POPUP =================
function openLogin(){
document.getElementById("loginPopup").style.display="flex";
}
function closeLogin(){
document.getElementById("loginPopup").style.display="none";
}

// ================= LOGIN =================
function login(){
let role=document.getElementById("role").value;
let id=document.getElementById("id").value;
let pass=document.getElementById("pass").value;

if(role==="admin" && id==="admin" && pass==="1234"){
localStorage.setItem("role","admin");
document.getElementById("website").style.display="none";
document.getElementById("admin").style.display="block";
}
else{
localStorage.setItem("role","student");
localStorage.setItem("sid",id);
document.getElementById("website").style.display="none";
document.getElementById("student").style.display="block";
}

closeLogin();
}

// ================= LOGOUT =================
function logout(){
localStorage.clear();
location.reload();
}

// ================= SAVE RESULT =================
function saveResult(){
let name=document.getElementById("sname").value;
let id=document.getElementById("sid").value;
let marks=document.getElementById("marks").value;

fetch(API_URL,{
method:"POST",
body:JSON.stringify({name:name,id:id,marks:marks})
})
.then(()=>alert("Saved"));
}

// ================= LOAD ALL =================
function loadResults(){
fetch(API_URL)
.then(res=>res.json())
.then(data=>{
let list=document.getElementById("list");
list.innerHTML="";
data.forEach(r=>{
let li=document.createElement("li");
li.innerText=r.join(" | ");
list.appendChild(li);
});
});
}

// ================= STUDENT RESULT =================
function loadMyResult(){
let myid=localStorage.getItem("sid");

fetch(API_URL)
.then(res=>res.json())
.then(data=>{
let list=document.getElementById("myResult");
list.innerHTML="";

let marksArr=[];

data.forEach(r=>{
if(r[1]==myid){
let li=document.createElement("li");
li.innerText=r.join(" | ");
list.appendChild(li);
marksArr.push(r[2]);
}
});

drawChart(marksArr);
});
}

// ================= CHART =================
function drawChart(marks){
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:marks.map((_,i)=>"Test "+(i+1)),
datasets:[{label:"Marks",data:marks}]
}
});
}

// ================= AUTO LOGIN =================
window.onload=function(){
let role=localStorage.getItem("role");

if(role==="admin"){
document.getElementById("website").style.display="none";
document.getElementById("admin").style.display="block";
}
if(role==="student"){
document.getElementById("website").style.display="none";
document.getElementById("student").style.display="block";
}
}

</script>

</body>
</html>
