<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chapter Wise Test</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.test-box{
max-width:900px;
margin:auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#d32f2f;
}

.info{
background:#fff3e0;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

#timer{
text-align:center;
font-size:30px;
font-weight:bold;
color:red;
margin:20px 0;
}

.question{
background:#fafafa;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

.option{
display:block;
margin:10px 0;
font-size:18px;
}

button{
width:100%;
padding:15px;
border:none;
background:#d32f2f;
color:#fff;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

.result{
display:none;
text-align:center;
padding:30px;
}

.loading{
text-align:center;
font-size:22px;
padding:20px;
}

</style>
</head>

<body>

<div class="test-box">

<h1>🤖 AI Chapter Wise Test</h1>

<div class="info">

<p>
<b>Board:</b>
CBSE
</p>

<p>
<b>Class:</b>
10
</p>

<p>
<b>Subject:</b>
Science
</p>

<p>
<b>Chapter:</b>
Physics
</p>

</div>

<div id="timer">
15:00
</div>

<div id="questionsBox">

<div class="loading">
Loading Questions...
</div>

</div>

<button onclick="submitTest()">
Submit Test
</button>

<div class="result" id="resultBox">

<h2 id="finalScore"></h2>

<h3 id="finalMessage"></h3>

</div>

</div>

<script>

/* CATEGORY */

let category = 17;

/*

17 = Science
18 = Computer
19 = Maths

*/

/* QUESTIONS */

const questionsBox =
document.getElementById("questionsBox");

let selectedQuestions = [];

/* LOAD QUESTIONS */

async function generateQuestions(){

try{

const response = await fetch(
`https://opentdb.com/api.php?amount=15&category=${category}&type=multiple`
);

const data = await response.json();

selectedQuestions = data.results.map(q => {

let options = [
...q.incorrect_answers,
q.correct_answer
];

/* SHUFFLE OPTIONS */

options.sort(() =>
Math.random() - 0.5
);

return {

q:q.question,

o:options,

a:options.indexOf(
q.correct_answer
)

};

});

questionsBox.innerHTML = "";

selectedQuestions.forEach((q,index)=>{

questionsBox.innerHTML += `

<div class="question">

<h3>
Q${index+1}.
${q.q}
</h3>

${q.o.map((opt,i)=>`

<label class="option">

<input
type="radio"
name="q${index}"
value="${i}">

${opt}

</label>

`).join("")}

</div>

`;

});

}
catch(error){

questionsBox.innerHTML =
"<h2>Questions Failed To Load</h2>";

console.log(error);

}

}

generateQuestions();

/* TIMER */

let time = 900;

const timer =
document.getElementById("timer");

const interval = setInterval(()=>{

let min =
Math.floor(time/60);

let sec =
time % 60;

timer.innerText =
`${min}:${sec<10?"0":""}${sec}`;

time--;

if(time < 0){

clearInterval(interval);

submitTest();

}

},1000);

/* SUBMIT */

function submitTest(){

clearInterval(interval);

let score = 0;

selectedQuestions.forEach((q,index)=>{

let ans =
document.querySelector(
`input[name=q${index}]:checked`
);

if(ans &&
Number(ans.value) === q.a){

score++;

}

});

document.getElementById("questionsBox")
.style.display = "none";

document.querySelector("button")
.style.display = "none";

document.getElementById("resultBox")
.style.display = "block";

document.getElementById("finalScore")
.innerText =
`Your Score: ${score}/15`;

let msg = "";

if(score >= 12){

msg = "🏆 Excellent";

}
else if(score >= 8){

msg = "👍 Good Job";

}
else{

msg = "📚 Keep Practicing";

}

document.getElementById("finalMessage")
.innerText = msg;

}

</script>

</body>
</html>
