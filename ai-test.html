<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Test</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.test-box{
max-width:900px;
margin:auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
color:#d32f2f;
text-align:center;
}

.info{
background:#fff3e0;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

#timer{
font-size:24px;
font-weight:bold;
color:red;
text-align:center;
margin:20px 0;
}

.question{
padding:20px;
margin-bottom:20px;
background:#fafafa;
border-radius:15px;
}

.option{
display:block;
margin:10px 0;
}

button{
width:100%;
padding:15px;
background:#d32f2f;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.result{
text-align:center;
padding:30px;
display:none;
}

</style>
</head>

<body>

<div class="test-box">

<h1>🤖 AI Chapter Wise Test</h1>

<div class="info">

<p><b>Board:</b>
<span id="showBoard"></span></p>

<p><b>Class:</b>
<span id="showClass"></span></p>

<p><b>Subject:</b>
<span id="showSubject"></span></p>

<p><b>Chapter:</b>
<span id="showChapter"></span></p>

</div>

<div id="timer">
15:00
</div>

<div id="questionsBox"></div>

<button onclick="submitTest()">
Submit Test
</button>

<div class="result" id="resultBox">

<h2 id="finalScore"></h2>

<h3 id="finalMessage"></h3>

</div>

</div>

<script>

/* DATA */

const board =
localStorage.getItem("board");

const studentClass =
localStorage.getItem("class");

const subject =
localStorage.getItem("subject");

const medium =
localStorage.getItem("medium");

const chapter =
localStorage.getItem("chapter");

/* SHOW DATA */

document.getElementById("showBoard")
.innerText = board;

document.getElementById("showClass")
.innerText = studentClass;

document.getElementById("showSubject")
.innerText = subject;

document.getElementById("showChapter")
.innerText = chapter;

 
/* =========================
GET DATA
========================= */

const board =
localStorage.getItem("board");

const studentClass =
localStorage.getItem("class");

const subject =
localStorage.getItem("subject");

const medium =
localStorage.getItem("medium");

const chapter =
localStorage.getItem("chapter");

/* SHOW DATA */

document.getElementById("showBoard")
.innerText = board;

document.getElementById("showClass")
.innerText = studentClass;

document.getElementById("showSubject")
.innerText = subject;

document.getElementById("showChapter")
.innerText = chapter;


/* =========================
GEMINI API
========================= */

const API_KEY =
"AIzaSyCQ6cpPbClgpPRlBpQLBHTrdTPfhg32xyw";


const questionsBox =
document.getElementById("questionsBox");

let selectedQuestions = [];


/* =========================
GENERATE AI QUESTIONS
========================= */

async function generateQuestions(){

questionsBox.innerHTML =
"<h2>⏳ AI Generating Questions...</h2>";

const prompt = `

Generate 15 MCQ questions in JSON format.

Board: ${board}

Class: ${studentClass}

Subject: ${subject}

Medium: ${medium}

Chapter: ${chapter}

Rules:

1. Give ONLY JSON array.
2. No explanation.
3. Format:

[
{
"q":"Question",
"o":["A","B","C","D"],
"a":0
}
]

4. Generate NEW unique questions.
5. Language should match medium.
6. Difficulty suitable for school students.

`;

try{

const response = await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:[
{
text:prompt
}
]
}
]

})

}

);

const data =
await response.json();

let text =
data.candidates[0]
.content.parts[0].text;

/* REMOVE MARKDOWN */

text = text
.replace(/```json/g,"")
.replace(/```/g,"")
.trim();

/* CONVERT JSON */

selectedQuestions =
JSON.parse(text);

/* SHOW QUESTIONS */

questionsBox.innerHTML = "";

selectedQuestions.forEach((q,index)=>{

questionsBox.innerHTML += `

<div class="question">

<h3>
Q${index+1}.
${q.q}
</h3>

${q.o.map((opt,i)=>`

<label class="option">

<input type="radio"
name="q${index}"
value="${i}">

${opt}

</label>

`).join("")}

</div>

`;

});

}
catch(error){

console.log(error);

questionsBox.innerHTML =

"<h2>❌ AI Failed. Try Again.</h2>";

}

}

generateQuestions();





/* TIMER */

let time = 900;

const timer =
document.getElementById("timer");

const interval = setInterval(()=>{

let min =
Math.floor(time/60);

let sec =
time % 60;

timer.innerText =
`${min}:${sec<10?"0":""}${sec}`;

time--;

if(time < 0){

clearInterval(interval);

submitTest();

}

},1000);


/* SUBMIT */

function submitTest(){

clearInterval(interval);

let score = 0;

selectedQuestions.forEach((q,index)=>{

let ans =
document.querySelector(
`input[name=q${index}]:checked`
);

if(ans && Number(ans.value) === q.a){

score++;

}

});

document.getElementById("questionsBox")
style.display = "none";

document.querySelector("button")
style.display = "none";

document.getElementById("resultBox")
style.display = "block";

document.getElementById("finalScore")
.innerText =
`Your Score: ${score}/15`;

let msg = "";

if(score >= 12){

msg = "🏆 Excellent";

}
else if(score >= 8){

msg = "👍 Good Job";

}
else{

msg = "📚 Keep Practicing";

}

document.getElementById("finalMessage")
.innerText = msg;

}

</script>

</body>
</html>
